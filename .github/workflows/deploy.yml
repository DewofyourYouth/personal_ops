name: CI + Deploy

# Tests run on every push and PR. Deploy runs only after tests pass on a push to
# main — the runner SSHes into the Hetzner box and rebuilds the container there.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: pytest tests/ -q

  deploy:
    needs: test
    # Only deploy on a real push to main, never on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-vps     # never run two deploys at once
      cancel-in-progress: false
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
    steps:
      # Skips cleanly (green) until the VPS secrets are configured.
      - name: Deploy over SSH
        if: env.VPS_HOST != ''
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$VPS_USER@$VPS_HOST" '
            set -e
            cd /opt/personal_ops
            git fetch --all
            git reset --hard origin/main      # match main exactly; leaves gitignored .env/log/context untouched
            docker compose up -d --build
            sleep 10
            docker compose ps
            cid="$(docker compose ps -q bot)"
            status="$(docker inspect -f "{{.State.Status}}" "$cid")"
            if [ "$status" != "running" ]; then
              echo "bot is $status after deploy"; docker compose logs --tail=80 bot; exit 1
            fi
            echo "Deployed. Bot is running."
          '
