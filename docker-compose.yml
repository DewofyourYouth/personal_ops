services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      OPS_CONTEXT_DIR: /app/ops/context
      # Don't buffer stdout/stderr so logs reach `docker logs` in real time.
      PYTHONUNBUFFERED: "1"
      # Run the container in Israel time so naive date.today()/datetime.now() calls
      # (used in relative-date parsing for reminders, events, digests) are correct.
      # Without this the container runs UTC and "tomorrow" is wrong late evening Israel time.
      TZ: Asia/Jerusalem
    volumes:
      # Persistent data — SQLite DBs, JSONL logs, scheduler state
      - ./ops/log:/app/ops/log
      # Context files — inside the repo on Mac; override with absolute path on VPS.
      - ./ops/context:/app/ops/context
      # Stickers + startup video (swap them without a rebuild)
      - ./telegram_stickers:/app/telegram_stickers:ro
      # Google Calendar OAuth credentials
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json
    working_dir: /app
    # Explicit DNS to ensure reliable resolution inside the container
    dns:
      - 8.8.8.8
      - 1.1.1.1
